<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
        <title>AWL Modpack</title>
        <script>
            function CDrop() {
                var x = document.getElementById("ActiveBuild");
                if (x.className.indexOf("w3-show") == -1) { 
                    x.className += " w3-show";
                } else {
                    x.className = x.className.replace(" w3-show", "");
                }
            }
        </script>
    </head>
    <body>
        <h1>Modpack Downloads</h1>
        <div class="w3-border-bottom" style="border: black;"></div>
        <p style="font: caption;">Couldn't be arsed making it look nice</p>
        <div></div>
        <p>This modpack is based off of the modpack "All of Create" by quickqwek on CurseForge. Go show 'em some love:</p>
            <div class="w3-card-2 w3-left-align w3-hover-orange w3-margin w3-button w3-round-xxlarge w3-grid" style="width: fit-content !important; grid-template-columns:auto auto auto; grid-template-rows: 20px auto; row-gap:5px; background-image: linear-gradient(to bottom, rgb(36, 36, 36), rgb(77, 77, 77))" href="https://www.curseforge.com/minecraft/modpacks/aoc">
                <img width="64" height="64" class="w3-margin w3-circle" src="https://media.forgecdn.net/avatars/thumbnails/845/271/64/64/638242920825975665.png" style="color: transparent; grid-row: 1/span 2;">
                <div class="w3-large w3-bold w3-margin w3-text-white" style="grid-column: 2/span 1;">All of Create</div>
                <div class="w3-small w3-margin w3-text-light-gray" style="grid-column: 2/span 1; grid-row: 2/span 1;">
                    <a>by</a> 
                        <div class="w3-container w3-margin w3-dark-gray w3-round-xlarge" style="width: 96px; height: 20px; margin-top:-15% !important; margin-left: 15% !important;">
                            <img class="w3-circle" src="https://static-cdn.jtvnw.net/jtv_user_pictures/e7fc9b48-d4d7-4b68-a2a4-33a69ad92900-profile_image-150x150.png" alt="quickqwek" style="scale: 60%; margin-left: -20%; margin-right: -5%; margin-top: -36%; margin-bottom: -36%;"> <a>quickqwek</a>
                        </div>
                </div>
            </div>
        <div class="w3-border-bottom w3-margin" style="border: black;"></div>
        <div class="w3-dropdown-click" onclick="CDrop()">
            <button class="w3-button w3-black">Active Builds</button>
            <div class="w3-dropdown-content w3-bar-block w3-border" id="ActiveBuild">
                <a href="https://example.com/active-build-1.zip" class="w3-bar-item w3-button">Active Build 1</a>
                <a href="https://example.com/active-build-2.zip" class="w3-bar-item w3-button">Active Build 2</a>
        </div>
    </body>
</html>
